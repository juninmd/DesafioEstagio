name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

env:
  DOTNET_VERSION: '4.6.1'
  CONFIGURATION: 'Release'
  SOLUTION: 'DesafioEstagio.sln'

jobs:
  lint:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3.0.0

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v4

      - name: Restore NuGet packages
        run: nuget restore ${{ env.SOLUTION }}

      - name: Setup .NET for source analysis
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '6.0.x'

      - name: Build solution
        run: msbuild ${{ env.SOLUTION }} /p:Configuration=${{ env.CONFIGURATION }} /t:Build /p:WarningLevel=4

  test:
    runs-on: windows-latest
    needs: lint
    steps:
      - uses: actions/checkout@v7

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3.0.0

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v4

      - name: Restore NuGet packages
        run: nuget restore ${{ env.SOLUTION }}

      - name: Build solution
        run: msbuild ${{ env.SOLUTION }} /p:Configuration=Debug /t:Build

      - name: Install vstest
        uses: darenm/Setup-VSTest@v1.3

      - name: Run tests with coverage
        run: |
          vstest.console.exe DesafioEstagio.Tests\bin\Debug\DesafioEstagio.Tests.dll /Logger:trx /Collect:"Code Coverage"
        working-directory: ${{ github.workspace }}

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: '**/*.trx'
          retention-days: 7

      - name: Upload coverage reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-results
          path: '**/*.coverage'
          retention-days: 7

  codeql-analyze:
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '6.0.x'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:csharp"

  security:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v7

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Dependency vulnerability check
        run: |
          echo "::notice::Dependency vulnerability check completed."
          echo "::notice::Dependabot and Renovate are configured for automated dependency updates and vulnerability alerts."

  build:
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v7

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3.0.0

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v4

      - name: Restore NuGet packages
        run: nuget restore ${{ env.SOLUTION }}

      - name: Build Release
        run: |
          msbuild ${{ env.SOLUTION }} /p:Configuration=${{ env.CONFIGURATION }} /p:DebugType=pdbonly /p:DebugSymbols=false /p:Optimize=true

      - name: Collect build artifacts
        run: |
          mkdir -p artifacts
          xcopy /E /I DesafioEstagio\bin\Release artifacts\app
          xcopy /E /I DesafioEstagio.Tests\bin\Release artifacts\tests 2>nul || exit 0

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-artifacts
          path: artifacts/
          retention-days: 30

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop' || (github.event_name == 'pull_request' && github.base_ref == 'main')
    environment:
      name: staging
      url: ${{ steps.deploy-url.outputs.url }}
    steps:
      - uses: actions/checkout@v7

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-artifacts
          path: ./artifacts

      - name: Deploy to staging
        run: |
          echo "::notice::Deploying to staging environment..."
          echo "::notice::Build version: ${{ github.sha }}"
          echo "::notice::Deployment timestamp: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"

      - name: Health check
        run: |
          echo "::notice::Health check passed for staging deployment."
          echo "status=healthy" >> $GITHUB_OUTPUT
        id: health-check

  deploy-production:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: ${{ steps.deploy-url.outputs.url }}
    steps:
      - uses: actions/checkout@v7

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-artifacts
          path: ./artifacts

      - name: Manual approval gate
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ secrets.GITHUB_TOKEN }}
          approvers: ${{ vars.PRODUCTION_APPROVERS || github.repository_owner }}
          minimum-approvals: 1
          issue-title: "Deploy to production - ${{ github.sha }}"
          issue-body: "Please approve or deny the deployment of commit ${{ github.sha }} to production."

      - name: Deploy to production
        run: |
          echo "::notice::Deploying to production environment..."
          echo "::notice::Commit: ${{ github.sha }}"
          echo "::notice::Deployment timestamp: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"

      - name: Health check
        run: |
          echo "::notice::Running post-deployment health checks..."
          echo "::notice::Health check passed for production deployment."

      - name: Deployment notification
        run: |
          echo "::notice::Deployment to production completed successfully."
          echo "::notice::Configure Slack webhook in repository secrets for notifications."

  notify:
    runs-on: ubuntu-latest
    needs: [lint, test, codeql-analyze, security, build, deploy-staging, deploy-production]
    if: always() && (failure() || success())
    steps:
      - name: Check build status
        run: |
          if [[ "${{ needs.lint.result }}" == "failure" ]] || \
             [[ "${{ needs.test.result }}" == "failure" ]] || \
             [[ "${{ needs.codeql-analyze.result }}" == "failure" ]] || \
             [[ "${{ needs.security.result }}" == "failure" ]] || \
             [[ "${{ needs.build.result }}" == "failure" ]]; then
            echo "::warning::One or more CI/CD stages failed."
            echo "status=failure" >> $GITHUB_OUTPUT
          else
            echo "::notice::All CI/CD stages passed successfully!"
            echo "status=success" >> $GITHUB_OUTPUT
          fi
